<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chemistry Applet Portal</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 40px;
        text-align: center;
        transition: background 0.3s, color 0.3s;
    }
    body.dark {
        background: #1e1e1e;
        color: #e0e0e0;
    }
    .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        max-width: 800px;
        margin: auto;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
        transition: background 0.3s, color 0.3s;
    }
    body.dark .container {
        background: #2c2c2c;
        color: #e0e0e0;
    }
    a.button {
        display: inline-block;
        padding: 14px 24px;
        margin-top: 20px;
        background: #0077cc;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-size: 18px;
    }
    a.button:hover { background: #005fa3; }
    footer {
        margin-top: 40px;
        color: #666;
        font-size: 14px;
    }
    body.dark footer { color: #aaa; }
    #darkToggle {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 8px 14px;
        background: #444;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }
</style>
</head>

<body>

<button id="darkToggle" onclick="toggleDark()">🌙 Dark Mode</button>

<div class="container">
    <img src="banner.png" alt="Chemistry Applet Banner" style="width:100%; border-radius:10px; margin-bottom:20px;">

    <h1>Interactive Chemistry Applet</h1>
    <p>
        Dimensional Analysis • Stoichiometry • Gas Laws<br>
        Designed for Moodle and Canvas integration.
    </p>

    <a class="button" href="chemistry_applet.html">Launch the Applet</a>

    <footer>
        Version 1.0.2 • Created for instructional use by Garnett
    </footer>
</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
